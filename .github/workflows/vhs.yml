name: vhs
on:
  workflow_dispatch:
    inputs:
      tape:
        description: 'Tape'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - demo.tape
          - new_package.tape
          - sync.tape

permissions: {}

jobs:
  vhs:
    name: Render VHS tapes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
        with:
          cache-target: release

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0

      - name: Install VHS
        run: |
          sudo apt update
          sudo apt install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest

      - name: Install komac
        run: cargo install --locked --path .

      - name: Recreate all VHS GIFs
        if: ${{ inputs.tape == 'all' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tape in demo.tape new_package.tape sync.tape; do
            vhs "assets/vhs/$tape"
          done

      - name: Recreate specific VHS GIF
        if: ${{ inputs.tape != 'all' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vhs "assets/vhs/${{ inputs.tape }}"

      - name: Upload VHS GIFs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vhs-gifs
          path: assets/vhs/*.gif
          if-no-files-found: error
          compression-level: 0

  create-pr:
    name: Create pull request
    needs: vhs
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download VHS GIFs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vhs-gifs
          path: assets/vhs

      - name: Set PR metadata
        id: prmeta
        env:
          TAPE: ${{ inputs.tape }}
        run: |
          if [ "$TAPE" = "all" ]; then
            {
              echo "title=Update all VHS GIFs"
              echo "branch=update-all-gifs"
              echo "body=This pull request updates all demo recordings."
            } >> "$GITHUB_OUTPUT"
          else
            base="${TAPE%.tape}"
            {
              echo "title=Update ${base}.gif"
              echo "branch=update-${base}-gif"
              echo "body=This pull request updates the ${base}.gif recording from assets/vhs/${TAPE}."
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: ${{ steps.prmeta.outputs.title }}
          branch: ${{ steps.prmeta.outputs.branch }}
          title: ${{ steps.prmeta.outputs.title }}
          body: ${{ steps.prmeta.outputs.body }}
