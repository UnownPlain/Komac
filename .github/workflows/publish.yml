name: Publish release

on:
  release:
    types: [released]

permissions: {}

jobs:
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # crates.io trusted publishing
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Retrieve temporary crates.io token
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  upload-virus-total:
    name: Upload release assets to VirusTotal
    runs-on: ubuntu-slim
    steps:
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            .exe$
            .deb$
            .rpm$
            .tar.gz$

  publish-winget:
    name: Publish to WinGet
    needs: publish-crates-io
    runs-on: ubuntu-slim
    steps:
      - uses: vedantmgoyal9/winget-releaser@7bd472be23763def6e16bd06cc8b1cdfab0e2fd5 # main
        with:
          identifier: RussellBanks.Komac
          installers-regex: 'komac-setup.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
